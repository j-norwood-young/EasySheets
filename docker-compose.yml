services:
  app:
    image: harbor.10layer.com/sovereignoffice/easysheets:${IMAGE_TAG:-latest}
    build: .
    env_file: .env
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DB_PATH=${DB_PATH:-file:/data/sqlite.db}
    volumes:
      - easysheets-data:/data

volumes:
  easysheets-data:
